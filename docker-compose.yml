# Containerized recompute-kit MCP server — isolated, deployable to the NAS.
# Build mirrors the repo (Dockerfile COPYs bin/ + mcp/). It joins the ENS Boiler / dinamic-kit
# network so `ensboiler-gateway-1` reaches it BY NAME at http://recompute-kit:7079/mcp (no
# host-IP/firewall guessing), AND publishes 7079 so host/LAN ops still hit <host>:7079.
# Redeploy after a recipe change:  docker compose up -d --build   (network is baked in, so a
# recreate never silently drops the gateway link — the footgun a bare `docker run` left open).
services:
  recompute-kit:
    build: .
    image: recompute-kit:latest
    container_name: recompute-kit
    restart: unless-stopped
    ports:
      - "7079:7079"
    environment:
      # gh auth — needed by recheck_ci and for private clones; optional for public repos
      - GH_TOKEN=${GH_TOKEN:-}
    networks:
      - ensboiler_default

# ensboiler_default is created by the ENS Boiler compose; we join it as an external network.
networks:
  ensboiler_default:
    external: true
